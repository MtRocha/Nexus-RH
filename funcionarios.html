<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus RH | Funcionários</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script defer src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
  <script defer src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
  <link rel="stylesheet" href="./style.css">
</head>
<body data-requires-auth="1">
  <div class="container-fluid"><div class="row g-0">
    <aside class="col-12 col-lg-3 col-xl-2 sidebar-shell sidebar-sticky p-3 p-md-4"><div class="d-flex align-items-center gap-2 mb-3"><i class="bi bi-building fs-4 text-white"></i><span class="sidebar-logo fs-4">Nexus RH</span></div><p class="sidebar-caption mb-4">Gestão de pessoas</p><nav class="nav flex-column sidebar-nav"><a class="nav-link" href="./index.html"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a><a class="nav-link active" href="./funcionarios.html"><i class="bi bi-people me-2"></i>Funcionários</a><a class="nav-link" href="./bater-ponto.html"><i class="bi bi-geo-alt me-2"></i>Mapa / Ponto</a><a class="nav-link" href="./holerites.html"><i class="bi bi-receipt me-2"></i>Holerites</a><a class="nav-link" href="./configuracoes.html"><i class="bi bi-gear me-2"></i>Configurações</a><a class="nav-link" href="./logs.html"><i class="bi bi-journal-text me-2"></i>Logs</a></nav><div class="mt-4 p-3 rounded-4 user-card"><div id="current-user-name" class="fw-semibold text-white">Carregando...</div><div id="current-user-profile" class="small text-white-50">-</div><button type="button" class="btn btn-sm btn-outline-light mt-3 w-100" data-action="logout">Sair</button></div></aside>
    <main class="col-12 col-lg-9 col-xl-10 main-shell p-4 p-xl-5"><div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-end gap-3 mb-4"><div><div class="text-uppercase small text-muted">Base de pessoas</div><h1 class="h2 mb-0">Funcionários</h1></div><span class="badge text-bg-primary-subtle text-primary-emphasis">Cadastro, consulta e desativação via interface</span></div><div id="funcionario-feedback" class="alert d-none"></div><div class="card panel-card shadow-sm border-0 mb-4"><div class="card-body"><h2 class="h5 mb-3">Novo funcionário</h2><form id="form-funcionario" class="row g-3"><div class="col-12 col-md-6"><label class="form-label">Nome</label><input name="nome" class="form-control" required></div><div class="col-12 col-md-3"><label class="form-label">CPF</label><input name="cpf" class="form-control" required></div><div class="col-12 col-md-3"><label class="form-label">E-mail</label><input name="email" type="email" class="form-control"></div><div class="col-12 col-md-3"><label class="form-label">Senha</label><input name="senha" type="password" class="form-control" required></div><div class="col-12 col-md-3"><label class="form-label">Perfil</label><select name="perfilAcesso" class="form-select"><option>Usuario</option><option>Gestor</option><option>Administrador</option></select></div><div class="col-12 col-md-3"><label class="form-label">Cargo</label><select name="cargoId" id="cargo-select" class="form-select" required><option value="">Carregando cargos...</option></select></div><div class="col-12 col-md-3"><label class="form-label">Centro de Custo</label><select name="centroCustoId" id="centro-custo-select" class="form-select" required><option value="">Carregando centros...</option></select></div><div class="col-12 col-md-3"><label class="form-label">Supervisor ID</label><input name="supervisorId" type="number" class="form-control" min="1"></div><div class="col-12 col-md-3"><label class="form-label">Salário atual</label><input name="salarioAtual" type="number" step="0.01" class="form-control" required></div><div class="col-12 col-md-3"><label class="form-label">Data admissão</label><input name="dataAdmissao" type="date" class="form-control" required></div><div class="col-12 col-md-3"><label class="form-label">Status</label><select name="status" class="form-select"><option>Ativo</option><option>Desligado</option></select></div><div class="col-12 d-grid d-md-flex justify-content-md-end"><button type="submit" class="btn btn-primary px-4"><i class="bi bi-plus-circle me-2"></i>Salvar funcionário</button></div></form></div></div><div class="card panel-card shadow-sm border-0"><div class="card-body"><div class="d-flex justify-content-between align-items-center mb-3"><h2 class="h5 mb-0">Funcionários cadastrados</h2><span class="badge text-bg-light text-dark">DataTables</span></div><div class="table-responsive"><table id="funcionarios-data-table" class="table table-hover align-middle table-corporate mb-0"><thead><tr><th>Nome</th><th>Cargo</th><th>Centro</th><th>CPF</th><th>E-mail</th><th>Status</th><th class="text-end">Ações</th></tr></thead><tbody id="funcionarios-table-body"></tbody></table></div></div></div></main>
  </div></div>
  <script defer src="./app.js"></script>
</body>
</html>
