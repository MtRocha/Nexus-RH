<head>

<body data-requires-auth="1">
  <div class="container-fluid"><div class="row g-0">
    <aside class="col-12 col-lg-3 col-xl-2 sidebar-shell sidebar-sticky p-3 p-md-4"><div class="d-flex align-items-center gap-2 mb-3"><i class="bi bi-building fs-4 text-white"></i><span class="sidebar-logo fs-4">Nexus RH</span></div><p class="sidebar-caption mb-4">Configuração por interface</p><nav class="nav flex-column sidebar-nav"><a class="nav-link" href="./index.html"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a><a class="nav-link" href="./funcionarios.html"><i class="bi bi-people me-2"></i>Funcionários</a><a class="nav-link" href="./bater-ponto.html"><i class="bi bi-geo-alt me-2"></i>Mapa / Ponto</a><a class="nav-link" href="./holerites.html"><i class="bi bi-receipt me-2"></i>Holerites</a><a class="nav-link active" href="./configuracoes.html"><i class="bi bi-gear me-2"></i>Configurações</a><a class="nav-link" href="./logs.html"><i class="bi bi-journal-text me-2"></i>Logs</a></nav><div class="mt-4 p-3 rounded-4 user-card"><div id="current-user-name" class="fw-semibold text-white">Carregando...</div><div id="current-user-profile" class="small text-white-50">-</div><button type="button" class="btn btn-sm btn-outline-light mt-3 w-100" data-action="logout">Sair</button></div></aside>
    <main class="col-12 col-lg-9 col-xl-10 main-shell p-4 p-xl-5"><div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-end gap-3 mb-4"><div><div class="text-uppercase small text-muted">Parâmetros operacionais</div><h1 class="h2 mb-0">Configurações</h1></div><span class="badge text-bg-primary-subtle text-primary-emphasis">Editável via interface, sem SQL manual</span></div><div id="configuracao-feedback" class="alert d-none"></div><div class="card panel-card shadow-sm border-0 mb-4"><div class="card-body"><h2 class="h5 mb-3">Nova configuração</h2><form id="form-configuracao" class="row g-3"><div class="col-12 col-md-4"><label class="form-label">Chave</label><input name="chave" class="form-control" placeholder="ex: empresa.nome" required></div><div class="col-12 col-md-4"><label class="form-label">Valor</label><input name="valor" class="form-control" required></div><div class="col-12 col-md-2"><label class="form-label">Categoria</label><input name="categoria" class="form-control" value="Geral"></div><div class="col-12 col-md-2"><label class="form-label">Tipo</label><select name="tipoCampo" class="form-select"><option value="texto">Texto</option><option value="numero">Número</option><option value="booleano">Booleano</option><option value="json">JSON</option><option value="url">URL</option></select></div><div class="col-12"><label class="form-label">Descrição</label><input name="descricao" class="form-control" placeholder="Contexto da configuração"></div><div class="col-12 col-md-3"><div class="form-check form-switch mt-2"><input name="editavel" class="form-check-input" type="checkbox" checked><label class="form-check-label">Editável</label></div></div><div class="col-12 col-md-3"><div class="form-check form-switch mt-2"><input name="ativo" class="form-check-input" type="checkbox" checked><label class="form-check-label">Ativa</label></div></div><div class="col-12 d-grid d-md-flex justify-content-md-end"><button type="submit" class="btn btn-primary px-4"><i class="bi bi-save me-2"></i>Salvar configuração</button></div></form></div></div><div class="card panel-card shadow-sm border-0"><div class="card-body"><div class="d-flex justify-content-between align-items-center mb-3"><h2 class="h5 mb-0">Parâmetros cadastrados</h2><span class="badge text-bg-light text-dark">DataTables</span></div><div class="table-responsive"><table id="configuracoes-data-table" class="table table-hover align-middle table-corporate mb-0"><thead><tr><th>Categoria</th><th>Chave</th><th>Valor</th><th>Tipo</th><th>Editável</th><th>Ativa</th></tr></thead><tbody id="configuracoes-table-body"></tbody></table></div></div></div></main>
  </div></div>
  <script defer src="./app.js"></script>
</body>
</html>
