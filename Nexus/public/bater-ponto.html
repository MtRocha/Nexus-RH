<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus RH | Mapa e Ponto</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="./style.css">
</head>
<body data-requires-auth="1">
  <div class="container-fluid"><div class="row g-0">
    <aside class="col-12 col-lg-3 col-xl-2 sidebar-shell sidebar-sticky p-3 p-md-4"><div class="d-flex align-items-center gap-2 mb-3"><i class="bi bi-building fs-4 text-white"></i><span class="sidebar-logo fs-4">Nexus RH</span></div><p class="sidebar-caption mb-4">Jornada e geolocalização</p><nav class="nav flex-column sidebar-nav"><a class="nav-link" href="./index.html"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a><a class="nav-link" href="./funcionarios.html"><i class="bi bi-people me-2"></i>Funcionários</a><a class="nav-link active" href="./bater-ponto.html"><i class="bi bi-geo-alt me-2"></i>Mapa / Ponto</a><a class="nav-link" href="./holerites.html"><i class="bi bi-receipt me-2"></i>Holerites</a><a class="nav-link" href="./configuracoes.html"><i class="bi bi-gear me-2"></i>Configurações</a><a class="nav-link" href="./logs.html"><i class="bi bi-journal-text me-2"></i>Logs</a></nav><div class="mt-4 p-3 rounded-4 user-card"><div id="current-user-name" class="fw-semibold text-white">Carregando...</div><div id="current-user-profile" class="small text-white-50">-</div><button type="button" class="btn btn-sm btn-outline-light mt-3 w-100" data-action="logout">Sair</button></div></aside>
    <main class="col-12 col-lg-9 col-xl-10 main-shell p-4 p-xl-5"><div class="row g-4 align-items-stretch"><div class="col-12 col-xl-6"><div class="card panel-card shadow-sm border-0 h-100"><div class="card-body d-flex flex-column justify-content-center"><div class="text-uppercase small text-muted mb-2">Registro de jornada</div><h1 class="h2 mb-3">Bater ponto</h1><div class="clock-display display-5 mb-3" id="clock-now">00:00:00</div><p id="mapa-info" class="text-muted mb-4">Carregando dados do mapa...</p><button class="btn btn-primary btn-lg" type="button"><i class="bi bi-fingerprint me-2"></i>Registrar ponto</button></div></div></div><div class="col-12 col-xl-6"><div class="card panel-card shadow-sm border-0 h-100"><div class="card-body"><div class="d-flex justify-content-between align-items-center mb-3"><h2 class="h5 mb-0">Local do ponto</h2><span id="mapa-titulo" class="badge text-bg-light text-dark">Nexus RH</span></div><div id="leaflet-map" class="map-frame rounded-4"></div></div></div></div></div></main>
  </div></div>
  <script defer src="./app.js"></script>
  <script>(function(){const c=document.getElementById('clock-now');const t=()=>{c.textContent=new Date().toLocaleTimeString('pt-BR');};t();setInterval(t,1000);})();</script>
</body>
</html>
