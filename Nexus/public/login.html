<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus RH | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="./style.css">
</head>

<body class="login-shell">
    <div class="container py-5">
        <div class="row justify-content-center align-items-center min-vh-100 py-4">
            <div class="col-12 col-md-10 col-lg-8 col-xl-7">
                <div class="card shadow-lg border-0 overflow-hidden">
                    <div class="row g-0">
                        <div class="col-md-5 login-brand-panel d-flex flex-column justify-content-between p-4 p-lg-5">
                            <div>
                                <h1 class="h3 fw-bold mb-2 text-white"><i class="bi bi-building me-2"></i>Nexus RH</h1>
                                <p class="mb-0 text-white-50">Sistema corporativo de Recursos Humanos</p>
                            </div>
                            <div class="small text-white-50 mt-5">
                                <div class="mb-2"><i class="bi bi-shield-check me-2"></i>Acesso seguro</div>
                                <div><i class="bi bi-clock-history me-2"></i>Controle de jornada integrado</div>
                            </div>
                        </div>

                        <div class="col-md-7 bg-white p-4 p-lg-5">
                            <h2 class="h4 mb-1">Entrar na Plataforma</h2>
                            <p class="text-muted mb-4">Use suas credenciais corporativas para acessar o painel.</p>

                            <form>
                                <div class="mb-3">
                                    <label for="email" class="form-label">E-mail Corporativo</label>
                                    <input type="email" class="form-control form-control-lg" id="email"
                                        value="mariana.oliveira@nexusrh.local">
                                </div>

                                <div class="mb-3">
                                    <label for="senha" class="form-label">Senha</label>
                                    <input type="password" class="form-control form-control-lg" id="senha"
                                        value="Senha@123">
                                </div>

                                <div class="d-flex justify-content-between align-items-center mb-4">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" value="" id="lembrar" checked>
                                        <label class="form-check-label" for="lembrar">Lembrar de mim</label>
                                    </div>
                                    <a href="#" class="text-decoration-none">Esqueci minha senha</a>
                                </div>

                                <a href="./index.html" class="btn btn-primary btn-lg w-100 mb-3">
                                    <i class="bi bi-box-arrow-in-right me-2"></i>Acessar Sistema
                                </a>
                                <div class="small text-muted text-center">Perfil de demonstração: Administrador RH</div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
