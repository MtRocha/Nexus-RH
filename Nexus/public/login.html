<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus RH | Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="./style.css">
</head>
<body class="login-shell">
  <div class="container py-5">
    <div class="row justify-content-center align-items-center min-vh-100 py-4">
      <div class="col-12 col-md-10 col-lg-9 col-xl-8">
        <div class="card login-card shadow-lg border-0 overflow-hidden">
          <div class="row g-0">
            <div class="col-md-5 login-brand-panel d-flex flex-column justify-content-between p-4 p-lg-5">
              <div><h1 class="h3 fw-bold mb-2 text-white"><i class="bi bi-building me-2"></i>Nexus RH</h1><p class="mb-0 text-white-50">Gestão de RH, logs, MFA e API em um só painel.</p></div>
              <div class="small text-white-50 mt-5"><div class="mb-2"><i class="bi bi-shield-check me-2"></i>Login seguro com TOTP</div><div><i class="bi bi-cloud-check me-2"></i>Pronto para hospedagem em nuvem</div></div>
            </div>
            <div class="col-md-7 bg-white p-4 p-lg-5">
              <div id="login-message" class="alert alert-info d-none"></div>
              <div id="login-step-one"><h2 class="h4 mb-1">Entrar na plataforma</h2><p class="text-muted mb-4">Use seu e-mail corporativo ou CPF e a senha cadastrada.</p><form id="login-form"><div class="mb-3"><label for="login" class="form-label">Login</label><input type="text" class="form-control form-control-lg" id="login" placeholder="email@empresa.com ou CPF"></div><div class="mb-3"><label for="senha" class="form-label">Senha</label><input type="password" class="form-control form-control-lg" id="senha" placeholder="Sua senha"></div><button type="submit" class="btn btn-primary btn-lg w-100">Acessar sistema</button></form></div>
              <div id="login-step-two" class="d-none"><h2 class="h4 mb-1">Validação MFA</h2><p class="text-muted mb-3">Informe o código do seu aplicativo autenticador.</p><div class="small text-muted mb-3">URI de provisionamento:<div id="mfa-provisioning" class="code-block mt-2"></div></div><form id="mfa-form"><input type="hidden" id="challengeToken"><div class="mb-3"><label for="codigo-mfa" class="form-label">Código TOTP</label><input type="text" class="form-control form-control-lg text-center code-input" id="codigo-mfa" maxlength="6" placeholder="000000"></div><button type="submit" class="btn btn-primary btn-lg w-100">Validar código</button></form></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script defer src="./auth.js"></script>
</body>
</html>
