<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus RH | Dashboard ADM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="container-fluid">
        <div class="row g-0">
            <aside class="col-12 col-lg-3 col-xl-2 sidebar-shell sidebar-sticky p-3 p-md-4">
                <div class="d-flex align-items-center gap-2 mb-2">
                    <i class="bi bi-building fs-4 text-white"></i>
                    <span class="sidebar-logo fs-4">Nexus RH</span>
                </div>
                <p class="sidebar-caption mb-4">Painel Administrativo</p>

                <nav class="nav flex-column sidebar-nav">
                    <a class="nav-link active" href="./index.html"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
                    <a class="nav-link" href="./funcionarios.html"><i class="bi bi-people me-2"></i>Funcionarios</a>
                    <a class="nav-link" href="./bater-ponto.html"><i class="bi bi-clock-history me-2"></i>Bater
                        Ponto</a>
                    <a class="nav-link" href="./holerites.html"><i class="bi bi-receipt me-2"></i>Holerites</a>
                </nav>
            </aside>

            <main class="col-12 col-lg-9 col-xl-10 bg-light main-shell p-4 p-md-5">
                <nav aria-label="breadcrumb" class="mb-4">
                    <ol class="breadcrumb mb-0">
                        <li class="breadcrumb-item"><a href="#">Inicio</a></li>
                        <li class="breadcrumb-item active" aria-current="page">Dashboard</li>
                    </ol>
                </nav>

                <div class="row g-3 mb-4">
                    <div class="col-12 col-md-4">
                        <div class="card shadow-sm h-100 border-0">
                            <div class="card-body">
                                <p class="text-muted mb-1">Total Funcionarios</p>
                                <h3 class="mb-1">186</h3>
                                <span class="badge text-bg-success">+12 no trimestre</span>
                            </div>
                        </div>
                    </div>
                    <div class="col-12 col-md-4">
                        <div class="card shadow-sm h-100 border-0">
                            <div class="card-body">
                                <p class="text-muted mb-1">Pontos Registrados Hoje</p>
                                <h3 class="mb-1">148</h3>
                                <span class="badge text-bg-primary">Turno matinal em andamento</span>
                            </div>
                        </div>
                    </div>
                    <div class="col-12 col-md-4">
                        <div class="card shadow-sm h-100 border-0">
                            <div class="card-body">
                                <p class="text-muted mb-1">Avisos</p>
                                <h3 class="mb-1">03</h3>
                                <span class="badge text-bg-warning">2 ferias pendentes</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row g-3">
                    <div class="col-12 col-md-6 col-xl-3">
                        <button class="btn btn-primary w-100 quick-action-btn shadow-sm"><i
                                class="bi bi-person-plus-fill me-2"></i>Adicionar Funcionario</button>
                    </div>
                    <div class="col-12 col-md-6 col-xl-3">
                        <button class="btn btn-outline-primary w-100 quick-action-btn shadow-sm"><i
                                class="bi bi-calendar2-check me-2"></i>Aprovar Ferias</button>
                    </div>
                    <div class="col-12 col-md-6 col-xl-3">
                        <button class="btn btn-outline-primary w-100 quick-action-btn shadow-sm"><i
                                class="bi bi-currency-dollar me-2"></i>Gerar Folha</button>
                    </div>
                    <div class="col-12 col-md-6 col-xl-3">
                        <button class="btn btn-outline-primary w-100 quick-action-btn shadow-sm"><i
                                class="bi bi-file-earmark-text me-2"></i>Relatorios</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

</body>

</html>
