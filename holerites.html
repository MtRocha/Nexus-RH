<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus RH | Holerites</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="./style.css">
</head>
<body data-requires-auth="1">
  <div class="container-fluid"><div class="row g-0">
    <aside class="col-12 col-lg-3 col-xl-2 sidebar-shell sidebar-sticky p-3 p-md-4"><div class="d-flex align-items-center gap-2 mb-3"><i class="bi bi-building fs-4 text-white"></i><span class="sidebar-logo fs-4">Nexus RH</span></div><p class="sidebar-caption mb-4">Remuneração e histórico</p><nav class="nav flex-column sidebar-nav"><a class="nav-link" href="./index.html"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a><a class="nav-link" href="./funcionarios.html"><i class="bi bi-people me-2"></i>Funcionários</a><a class="nav-link" href="./bater-ponto.html"><i class="bi bi-geo-alt me-2"></i>Mapa / Ponto</a><a class="nav-link active" href="./holerites.html"><i class="bi bi-receipt me-2"></i>Holerites</a><a class="nav-link" href="./logs.html"><i class="bi bi-journal-text me-2"></i>Logs</a></nav><div class="mt-4 p-3 rounded-4 user-card"><div id="current-user-name" class="fw-semibold text-white">Carregando...</div><div id="current-user-profile" class="small text-white-50">-</div><button type="button" class="btn btn-sm btn-outline-light mt-3 w-100" data-action="logout">Sair</button></div></aside>
    <main class="col-12 col-lg-9 col-xl-10 main-shell p-4 p-xl-5"><div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-end gap-3 mb-4"><div><div class="text-uppercase small text-muted">Folha e comprovantes</div><h1 class="h2 mb-0">Holerites</h1></div><span class="badge text-bg-primary-subtle text-primary-emphasis">Disponível para download em PDF</span></div><div id="holerite-admin-card" class="card panel-card shadow-sm border-0 mb-4 d-none"><div class="card-body"><div class="d-flex justify-content-between align-items-center mb-3"><h2 class="h5 mb-0">Gerar holerite</h2><span class="badge text-bg-light text-dark">Administrador</span></div><div id="holerite-admin-feedback" class="alert d-none"></div><form id="holerite-admin-form" class="row g-3"><div class="col-12 col-md-5"><label class="form-label">Funcionário</label><select id="holerite-funcionario" class="form-select" required><option value="">Selecione</option></select></div><div class="col-6 col-md-2"><label class="form-label">Mês</label><input id="holerite-mes" type="number" min="1" max="12" class="form-control" required></div><div class="col-6 col-md-2"><label class="form-label">Ano</label><input id="holerite-ano" type="number" min="2000" max="2100" class="form-control" required></div><div class="col-12 col-md-3"><label class="form-label">Dias trabalhados</label><input id="holerite-dias" type="number" min="0" max="31" class="form-control" required></div><div class="col-12 d-grid d-md-flex justify-content-md-end"><button type="submit" class="btn btn-primary"><i class="bi bi-file-earmark-plus me-2"></i>Gerar holerite</button></div></form></div></div><div id="holerites-list" class="row row-cols-1 row-cols-md-3 g-4"></div></main>
  </div></div>
  <script defer src="./app.js"></script>

</html>
