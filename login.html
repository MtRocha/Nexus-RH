<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus RH | Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="./style.css">
</head>
<body class="login-shell">
  <div class="container py-5">
    <div class="row justify-content-center align-items-center min-vh-100 py-4">
      <div class="col-12 col-md-10 col-lg-9 col-xl-8">
        <div class="card login-card shadow-lg border-0 overflow-hidden">
          <div class="row g-0">
            <div class="col-md-5 login-brand-panel d-flex flex-column justify-content-between p-4 p-lg-5">
              <div><h1 class="h3 fw-bold mb-2 text-white"><i class="bi bi-building me-2"></i>Nexus RH</h1><p class="mb-0 text-white-50">Gestão de RH, logs e API em um só painel.</p></div>
              <div class="small text-white-50 mt-5"><div><i class="bi bi-cloud-check me-2"></i>Pronto para hospedagem em nuvem</div></div>
            </div>
            <div class="col-md-7 bg-white p-4 p-lg-5">
              <div id="login-message" class="alert alert-info d-none"></div>
              <div id="login-step-one"><h2 class="h4 mb-1">Entrar na plataforma</h2><p class="text-muted mb-4">Use seu e-mail corporativo ou CPF e a senha cadastrada.</p><form id="login-form"><div class="mb-3"><label for="login" class="form-label">Login</label><input type="text" class="form-control form-control-lg" id="login" placeholder="email@empresa.com ou CPF"></div><div class="mb-3"><label for="senha" class="form-label">Senha</label><input type="password" class="form-control form-control-lg" id="senha" placeholder="Sua senha"></div><button type="submit" class="btn btn-primary btn-lg w-100">Acessar sistema</button></form><div class="text-center mt-3"><button type="button" class="btn btn-link" data-action="show-reset">Esqueci minha senha</button></div></div>
              <div id="login-reset" class="d-none"><h2 class="h4 mb-1">Redefinir senha</h2><p class="text-muted mb-4">Informe seu CPF e defina uma nova senha.</p><form id="reset-cpf-form"><div class="mb-3"><label for="reset-cpf" class="form-label">CPF</label><input type="text" class="form-control form-control-lg" id="reset-cpf" placeholder="Somente numeros"></div><div class="mb-3"><label for="reset-senha" class="form-label">Nova senha</label><input type="password" class="form-control form-control-lg" id="reset-senha" placeholder="Defina uma nova senha"></div><button type="submit" class="btn btn-primary btn-lg w-100">Atualizar senha</button></form><div class="text-center mt-3"><button type="button" class="btn btn-link" data-action="show-login">Voltar ao login</button></div></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script defer src="./auth.js"></script>
</body>
</html>
